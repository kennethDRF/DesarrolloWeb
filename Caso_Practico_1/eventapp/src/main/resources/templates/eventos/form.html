<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${evento.id} != null ? 'Editar evento | EventApp' : 'Nuevo evento | EventApp'">Evento | EventApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4" style="max-width: 720px;">

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/eventos}">Eventos</a></li>
            <li class="breadcrumb-item active" th:text="${evento.id} != null ? 'Editar' : 'Nuevo'">Formulario</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-4" th:text="${evento.id} != null ? 'Editar evento' : 'Registrar evento'">Formulario</h3>

            <form th:action="${evento.id} != null ? @{/eventos/{id}(id=${evento.id})} : @{/eventos}"
                  th:object="${evento}" method="post">

                <input type="hidden" th:field="*{id}">

                <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger py-2 small">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    Corrija los errores marcados en el formulario.
                </div>

                <div class="mb-3">
                    <label for="nombre" class="form-label small fw-bold">Nombre del evento <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-sm" id="nombre"
                           th:classappend="${#fields.hasErrors('nombre')} ? 'is-invalid'"
                           th:field="*{nombre}" placeholder="Ingrese el titulo del evento">
                    <div class="invalid-feedback" th:errors="*{nombre}">Error</div>
                </div>

                <div class="mb-3">
                    <label for="descripcion" class="form-label small fw-bold">Descripcion</label>
                    <textarea class="form-control form-control-sm" id="descripcion" rows="3"
                              th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid'"
                              th:field="*{descripcion}" placeholder="Describa brevemente el evento"></textarea>
                    <div class="invalid-feedback" th:errors="*{descripcion}">Error</div>
                </div>

                <div class="mb-3">
                    <label for="fecha" class="form-label small fw-bold">Fecha <span class="text-danger">*</span></label>
                    <input type="date" class="form-control form-control-sm" id="fecha"
                           th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'"
                           th:field="*{fecha}">
                    <div class="invalid-feedback" th:errors="*{fecha}">Error</div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="lugar" class="form-label small fw-bold">Lugar <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm" id="lugar"
                               th:classappend="${#fields.hasErrors('lugar')} ? 'is-invalid'"
                               th:field="*{lugar}" placeholder="Donde se realiza">
                        <div class="invalid-feedback" th:errors="*{lugar}">Error</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="categoria" class="form-label small fw-bold">Categoria <span class="text-danger">*</span></label>
                        <select class="form-select form-select-sm" id="categoria"
                                th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'"
                                th:field="*{categoria}">
                            <option value="">-- Elija una opcion --</option>
                            <option value="Musica">Musica</option>
                            <option value="Conferencia">Conferencia</option>
                            <option value="Taller">Taller</option>
                            <option value="Deporte">Deporte</option>
                            <option value="Gastronomia">Gastronomia</option>
                            <option value="Tecnologia">Tecnologia</option>
                            <option value="Cultura">Cultura</option>
                            <option value="Charla">Charla</option>
                            <option value="Carrera">Carrera</option>
                            <option value="Universitario">Universitario</option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{categoria}">Error</div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="organizador" class="form-label small fw-bold">Organizador</label>
                        <input type="text" class="form-control form-control-sm" id="organizador"
                               th:classappend="${#fields.hasErrors('organizador')} ? 'is-invalid'"
                               th:field="*{organizador}" placeholder="Nombre del responsable">
                        <div class="invalid-feedback" th:errors="*{organizador}">Error</div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="cupoMaximo" class="form-label small fw-bold">Cupo <span class="text-danger">*</span></label>
                        <input type="number" class="form-control form-control-sm" id="cupoMaximo"
                               th:classappend="${#fields.hasErrors('cupoMaximo')} ? 'is-invalid'"
                               th:field="*{cupoMaximo}" min="1">
                        <div class="invalid-feedback" th:errors="*{cupoMaximo}">Error</div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label for="precio" class="form-label small fw-bold">Precio</label>
                        <input type="number" step="0.01" class="form-control form-control-sm" id="precio"
                               th:classappend="${#fields.hasErrors('precio')} ? 'is-invalid'"
                               th:field="*{precio}" min="0" placeholder="0.00">
                        <div class="invalid-feedback" th:errors="*{precio}">Error</div>
                    </div>
                </div>

                <hr>

                <div class="d-flex justify-content-between">
                    <a th:href="@{/eventos}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-success btn-sm">
                        <i class="bi bi-save me-1"></i>Guardar evento
                    </button>
                </div>
            </form>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
