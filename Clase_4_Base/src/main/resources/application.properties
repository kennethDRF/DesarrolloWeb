spring.application.name=clase4base
server.port=8080

# Recargar plantillas Thymeleaf sin reiniciar (dev)
spring.thymeleaf.cache=false

# Nivel de logs - INFO en clase, DEBUG si hay que ver mas detalle
logging.level.root=INFO

#==============================================================
#CLASE 4: descomentar estas propiedades cuando agreguen JPA
#==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/cursoswebdb
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate crea / actualiza las tablas a partir de las @Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Ver el SQL generado en la consola (util en clase)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#==============================================================
#CLASE 6: descomentar cuando agregamos el bonus de Firebase Storage (PARTE E)
#==============================================================
# Limite de tamanio de archivos subidos via multipart/form-data
#spring.servlet.multipart.max-file-size=5MB
#spring.servlet.multipart.max-request-size=5MB

