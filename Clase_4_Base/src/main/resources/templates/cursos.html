<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos | SC-403</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Cursos disponibles</h1>
            <p class="text-muted">
                Total:
                <span class="badge bg-primary" th:text="${cursos.size()}">0</span>
            </p>
        </div>

        <!-- CLASE 6 - PARTE A.1: descomentar el boton para abrir el formulario de nuevo curso -->
        <!--
        <a class="btn btn-primary" th:href="@{/cursos/nuevo}">
            <i class="bi bi-plus-circle me-1"></i> Nuevo curso
        </a>
        -->
    </div>

    <!-- CLASE 6 - PARTE D: descomentar el alert para mostrar el flash de exito (ok) -->
    <!--
    <div class="alert alert-success alert-dismissible fade show" role="alert"
         th:if="${ok}">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${ok}">Operacion realizada</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    -->

    <!-- CLASE 6 - PARTE D (opcional): descomentar el alert para mostrar mensajes de error -->
    <!--
    <div class="alert alert-danger alert-dismissible fade show" role="alert"
         th:if="${error}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        <span th:text="${error}">Hubo un error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    -->


    <!--
      Iteracion con th:each.
      Cada elemento "c" es un objeto Curso, accedemos a sus campos con c.id, c.nombre, etc.
    -->
    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4"
             th:each="c, iter : ${cursos}">

            <div class="card h-100 shadow-sm card-hover">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start">
                        <span class="badge bg-secondary mb-2"
                              th:text="'#' + ${iter.count}">#1</span>
                        <span class="badge bg-info text-dark"
                              th:text="${c.creditos} + ' creditos'">0 creditos</span>
                    </div>

                    <h5 class="card-title brand-accent" th:text="${c.nombre}">
                        Nombre del curso
                    </h5>

                    <p class="text-muted small flex-grow-1"
                       th:text="${c.descripcion}">
                        Descripcion breve del curso.
                    </p>

                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <small class="text-muted">
                            <i class="bi bi-person-circle me-1"></i>
                            <span th:text="${c.profesor}">Profesor</span>
                        </small>
                        <div class="btn-group btn-group-sm">
                            <a class="btn btn-outline-primary"
                               th:href="@{/cursos/{id}(id=${c.id})}">
                                Ver
                            </a>

                            <!-- CLASE 6 - PARTE B.1: descomentar el boton Editar -->
                            <!--
                            <a class="btn btn-outline-warning"
                               th:href="@{/cursos/{id}/editar(id=${c.id})}">
                                <i class="bi bi-pencil"></i>
                            </a>
                            -->

                            <!-- CLASE 6 - PARTE C.2: descomentar el boton Eliminar que dispara el modal -->
                            <!--
                            <button type="button"
                                    class="btn btn-outline-danger btn-eliminar"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalEliminar"
                                    th:data-id="${c.id}"
                                    th:data-nombre="${c.nombre}">
                                <i class="bi bi-trash"></i>
                            </button>
                            -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensaje cuando no hay cursos (por ej. si vacian la tabla en clase) -->
    <div class="alert alert-warning mt-4"
         th:if="${cursos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay cursos para mostrar.
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
